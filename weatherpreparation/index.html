<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight Weather Prep - justinverstijnen.nl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sky-header">
  <div class="cloud cloud-1" aria-hidden="true"></div>
  <div class="cloud cloud-2" aria-hidden="true"></div>
  <div class="header-content">
    <p class="eyebrow">Vluchtvoorbereiding</p>
    <h1>✈️ Flight Weather Prep</h1>
    <h2>Snel de belangrijkste bronnen bekijken voor kleine luchtvaart en vertrekvoorbereiding</h2>
  </div>
</header>

<main>
  <section class="intro-card">
    <h3>Snelle toegang</h3>
    <p>Klik op een volledige balk om direct de juiste bron te openen. De METAR-kaart bevat de gevraagde velden onder elkaar.</p>
  </section>

  <section>
    <div id="weather-list" class="weather-list"></div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
